apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: sap-assignment03
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
        - name: api-gateway
          image: lorenzodangelo/api-gateway:v1
          ports:
            - containerPort: 8080
            - containerPort: 9080
          env:
            - name: PORT
              value: "8080"
            - name: METRICS_PORT
              value: "9080"
            - name: REQUEST_SERVICE_URL
              value: "http://request-service:8081"
            - name: DELIVERY_SERVICE_URL
              value: "http://delivery-service:8082"
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: sap-assignment03
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "9080"
spec:
  type: LoadBalancer
  selector:
    app: api-gateway
  ports:
    - name: http
      port: 8080
      targetPort: 8080
      nodePort: 30080
    - name: metrics
      port: 9080
      targetPort: 9080