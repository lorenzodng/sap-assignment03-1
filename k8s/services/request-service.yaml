apiVersion: apps/v1
kind: Deployment
metadata:
  name: request-service
  namespace: sap-assignment03
spec:
  replicas: 1
  selector:
    matchLabels:
      app: request-service
  template:
    metadata:
      labels:
        app: request-service
    spec:
      containers:
        - name: request-service
          image: lorenzodangelo/request-service:v1
          ports:
            - name: http
              containerPort: 8081
            - name: metrics
              containerPort: 9081
          env:
            - name: PORT
              value: "8081"
            - name: METRICS_PORT
              value: "9081"
            - name: KAFKA_BOOTSTRAP_SERVERS
              value: "kafka-service:9092"

---
apiVersion: v1
kind: Service
metadata:
  name: request-service
  namespace: sap-assignment03
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "9081"
    prometheus.io/path: "/metrics"
spec:
  selector:
    app: request-service
  ports:
    - name: http
      protocol: TCP
      port: 8081
      targetPort: 8081
    - name: metrics
      protocol: TCP
      port: 9081
      targetPort: 9081