apiVersion: apps/v1
kind: Deployment
metadata:
  name: delivery-service
  namespace: sap-assignment03
spec:
  replicas: 1
  selector:
    matchLabels:
      app: delivery-service
  template:
    metadata:
      labels:
        app: delivery-service
    spec:
      containers:
        - name: delivery-service
          image: lorenzodangelo/delivery-service:v1
          ports:
              - name: http
                containerPort: 8082
          env:
            - name: PORT
              value: "8082"
            - name: KAFKA_BOOTSTRAP_SERVERS
              value: "kafka-service:9092"
---
apiVersion: v1
kind: Service
metadata:
  name: delivery-service
  namespace: sap-assignment03
spec:
  selector:
    app: delivery-service
  ports:
    - protocol: TCP
      port: 8082
      targetPort: 8082